<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Template - ระบบรายงานผลการฝึกอบรมฯ กรมประมง</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #60a5fa 100%);
            width: 1200px;
            height: 630px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* Background pattern */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.1;
        }

        .bg-pattern::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                radial-gradient(circle at 25% 25%, rgba(255,255,255,0.2) 2px, transparent 2px),
                radial-gradient(circle at 75% 75%, rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 50px 50px;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            max-width: 1000px;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin: 0 auto 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            line-height: 1.2;
        }

        .subtitle {
            font-size: 28px;
            margin-bottom: 20px;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .tagline {
            font-size: 20px;
            margin-bottom: 30px;
            opacity: 0.8;
            font-weight: 300;
        }

        .features {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
            gap: 30px;
        }

        .feature {
            flex: 1;
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .feature-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .feature-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .feature-desc {
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.4;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            text-align: center;
            font-size: 16px;
            opacity: 0.7;
        }

        .department {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="content">
        <div class="logo-container">
            <div class="logo">🐟</div>
        </div>

        <h1 class="title">ระบบรายงานผลการฝึกอบรมฯ</h1>
        <h2 class="subtitle">(แบบ กบค.1) กรมประมง</h2>
        <p class="tagline">ระบบออนไลน์สำหรับการรายงานและติดตามผลการพัฒนาทักษะ</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-title">รายงานอัตโนมัติ</div>
                <div class="feature-desc">สร้างรายงานครบถ้วน พร้อมสถิติและกราฟ</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div class="feature-title">ปลอดภัยสูง</div>
                <div class="feature-desc">ระบบรักษาความปลอดภัยและความลับ</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📱</div>
                <div class="feature-title">ใช้งานง่าย</div>
                <div class="feature-desc">เข้าถึงได้ทุกที่ทุกเวลา</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="department">กรมประมง กระทรวงเกษตรและสหกรณ์</div>
    </div>
</body>
</html>
